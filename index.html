<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videy to JSON (External Config)</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 14px; }
        textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; font-family: monospace; resize: vertical; }
        .btn-main { margin-top: 20px; width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s;}
        .btn-main:hover { background-color: #218838; }
        .btn-main:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        .btn-copy { margin-top: 10px; width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s;}
        .btn-copy:hover { background-color: #0056b3; }

        .btn-reset { background: none; border: none; color: #dc3545; font-size: 12px; cursor: pointer; text-decoration: underline; padding: 0; margin-top: 5px;}

        #log { margin-top: 20px; padding: 12px; background: #222; color: #00ff00; font-family: monospace; border-radius: 4px; min-height: 100px; white-space: pre-wrap; word-wrap: break-word; font-size: 13px; line-height: 1.5; }
        .result-box { margin-top: 20px; padding: 15px; background: #e9ecef; border-left: 5px solid #007bff; border-radius: 4px; display: none; }
        .result-box h3 { margin-top: 0; font-size: 16px; color: #333; }
        .info-text { font-size: 13px; color: #555; background: #fff3cd; padding: 8px; border-left: 4px solid #ffc107; margin-bottom: 15px; border-radius: 3px;}
    </style>
</head>
<body>

<div class="card">
    <h2>Konversi Videy ke JSON</h2>
    <div class="info-text">
        Awalan ID saat ini: <strong id="currentIdDisplay">Memuat...</strong>
        <br>
        <button class="btn-reset" onclick="resetId()">[Klik di sini untuk Reset ID ke awal]</button>
    </div>

    <label>Masukkan Link Videy (Satu link per baris):</label>
    <textarea id="inputLinks" rows="8" placeholder="Contoh:&#10;Https://videy.co/v/?id=GTRd5Yuj1"></textarea>
    
    <button class="btn-main" onclick="processAndPush()" id="btnSubmit">Convert & Kirim Semua</button>
    
    <div id="resultArea" class="result-box">
        <h3>🎉 Link Berhasil Dibuat:</h3>
        <textarea id="outputLinks" rows="5" readonly></textarea>
        <button id="btnCopy" class="btn-copy" onclick="copyAllLinks()">📋 Salin Semua Link</button>
    </div>
</div>

<div id="log">Status: Menunggu input link...</div>



<script>
    window.SETTING_LUAR = {
        awalanId: "k1495Tk", 
        
        domainOutput: "https://cdn2.slicedrive.cloud/"
    };
</script>
